# Application
spring.application.name=applytogether

# Database health
management.endpoint.health.show-details=always

# Server (Local)
server.port=8080

# Frontend (CORS)
frontend.url=${FRONTEND_URL:http://localhost:5173,http://localhost:5174}

# Database (Dynamic: Supabase vars or local PostgreSQL default)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/applytogether?preparedStatementCacheQueries=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET:change-this-local-secret-before-use}
jwt.expiration=86400000

spring.jpa.open-in-view=false
spring.main.lazy-initialization=true
logging.level.root=INFO
logging.level.org.hibernate=ERROR


