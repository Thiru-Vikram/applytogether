# Application
spring.application.name=applytogether

# Database health
management.endpoint.health.show-details=always

# Server (Local)
server.port=8080

# Frontend (CORS)
frontend.url=${FRONTEND_URL:https://applytogether.app,http://localhost:5173,http://localhost:5174,http://localhost:5000,http://0.0.0.0:5000}

# Database (Dynamic: Supabase vars or local H2 fallback)
# Defaults to an ultra-fast H2 in-memory DB so it runs instantly without installation.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:applytogetherdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# JWT
# IMPORTANT: Override JWT_SECRET in production via environment variable.
# Must be at least 32 characters (256 bits) for JJWT HS256.
jwt.secret=${JWT_SECRET:applytogether-local-dev-secret-key-32chars!!}
jwt.expiration=86400000

spring.jpa.open-in-view=false
spring.main.lazy-initialization=true
logging.level.root=INFO
logging.level.org.hibernate=ERROR

# H2 Console (local debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


